name: Build Scion Images

on:
  workflow_dispatch:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io/myorg)'
        required: true
      target:
        description: 'Build target'
        type: choice
        options:
          - common
          - all
          - core-base
          - scion-base
          - harnesses
          - hub
        default: 'common'
      tag:
        description: 'Image tag'
        default: 'latest'
      platform:
        description: 'Target platform(s)'
        type: choice
        options:
          - all
          - linux/amd64
          - linux/arm64
        default: 'all'

  workflow_call:
    inputs:
      registry:
        description: 'Container registry (e.g., ghcr.io/myorg)'
        required: true
        type: string
      target:
        description: 'Build target (common, all, core-base, scion-base, harnesses, hub)'
        type: string
        default: 'common'
      tag:
        description: 'Image tag'
        type: string
        default: 'latest'
      platform:
        description: 'Target platform(s) (all, linux/amd64, linux/arm64)'
        type: string
        default: 'all'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and Push Images (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(inputs.registry, 'ghcr.io')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        if: inputs.platform == 'all' || inputs.platform == matrix.platform
        run: |
          TAG="${{ inputs.tag }}"
          if [ "${{ inputs.platform }}" = "all" ]; then
            TAG="${TAG}-${{ matrix.arch }}"
          fi

          image-build/scripts/build-images.sh \
            --registry "${{ inputs.registry }}" \
            --target "${{ inputs.target }}" \
            --tag "${TAG}" \
            --platform "${{ matrix.platform }}" \
            --push

  merge-manifests:
    name: Create Multi-Arch Manifests
    needs: build
    if: inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: startsWith(inputs.registry, 'ghcr.io')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge arch-specific tags
        run: |
          TAG="${{ inputs.tag }}"
          REG="${{ inputs.registry }}"
          TARGET="${{ inputs.target }}"

          IMAGES=""
          case "${TARGET}" in
            core-base) IMAGES="core-base" ;;
            scion-base) IMAGES="scion-base" ;;
            harnesses) IMAGES="scion-antigravity scion-claude scion-codex scion-copilot scion-gemini-cli scion-gen scion-hermes scion-opencode" ;;
            hub) IMAGES="scion-hub" ;;
            common) IMAGES="core-base scion-base scion-antigravity scion-claude scion-codex scion-copilot scion-gemini-cli scion-gen scion-hermes scion-opencode scion-hub" ;;
            all) IMAGES="core-base scion-base scion-antigravity scion-claude scion-codex scion-copilot scion-gemini-cli scion-gen scion-hermes scion-opencode scion-hub" ;;
          esac

          for img in $IMAGES; do
            if docker buildx imagetools inspect "${REG}/${img}:${TAG}-amd64" >/dev/null 2>&1 && \
               docker buildx imagetools inspect "${REG}/${img}:${TAG}-arm64" >/dev/null 2>&1; then
              docker buildx imagetools create \
                --tag "${REG}/${img}:${TAG}" \
                "${REG}/${img}:${TAG}-amd64" \
                "${REG}/${img}:${TAG}-arm64"
            else
              echo "WARNING: one or both arch images missing for ${img}, skipping manifest merge"
            fi
          done
