name: Preview Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-preview-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync fork from upstream main
        run: |
          git remote add upstream https://github.com/GoogleCloudPlatform/scion.git || true
          git fetch upstream main
          git reset --hard upstream/main

      - name: Build and push preview images
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          bash image-build/scripts/build-images.sh \
            --registry ghcr.io/homebrew-scion \
            --target common \
            --tag preview \
            --platform all \
            --push
