name: Release Automation

on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches:
      - tap-release
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Version to build (e.g. 0.2.0, without v prefix). Skips release detection.'
        required: false
        default: ''
      skip_formula_update:
        description: 'Skip updating the homebrew formula (just build images)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  detect-release:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Allow manual force via workflow_dispatch input
          if [[ -n "${{ inputs.force_version }}" ]]; then
            echo "Force-building version: ${{ inputs.force_version }}"
            echo "new_version=${{ inputs.force_version }}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST=$(gh api repos/homebrew-scion/scion/releases/latest --jq '.tag_name')
          IS_PRERELEASE=$(gh api repos/homebrew-scion/scion/releases/latest --jq '.prerelease')

          # Strip leading 'v' for version comparison
          LATEST_VERSION="${LATEST#v}"

          # Fetch current formula version from the tap repo
          FORMULA_VERSION=$(gh api repos/homebrew-scion/homebrew-scion/contents/Formula/scion.rb \
            --jq '.content' | base64 -d | grep -oP '^\s*version\s+"\K[^"]+')

          echo "Upstream latest: $LATEST_VERSION (prerelease: $IS_PRERELEASE)"
          echo "Formula version: $FORMULA_VERSION"

          if [ "$LATEST_VERSION" != "$FORMULA_VERSION" ]; then
            echo "new_version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          else
            echo "No new version detected"
            echo "new_version=" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    needs: detect-release
    if: needs.detect-release.outputs.new_version != ''
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            arch: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            arch: arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.force_version != '' && 'main' || format('v{0}', needs.detect-release.outputs.new_version) }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images (${{ matrix.arch }})
        run: |
          VERSION="${{ needs.detect-release.outputs.new_version }}"

          # Use --target all in a single invocation so core-base and scion-base
          # are in the same build run. This lets the orchestrator use the local
          # builder cache for the core-base→scion-base dependency instead of
          # pulling from the registry (which can fail with "no match for platform
          # in manifest" immediately after a fresh push).
          bash image-build/scripts/build-images.sh \
            --registry ghcr.io/homebrew-scion \
            --target all \
            --tag "v${VERSION}-${{ matrix.arch }}" \
            --platform "${{ matrix.platform }}" \
            --push

  merge-manifests:
    needs: [detect-release, build-images]
    if: needs.detect-release.outputs.new_version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          VERSION="${{ needs.detect-release.outputs.new_version }}"
          IS_PRERELEASE="${{ needs.detect-release.outputs.is_prerelease }}"
          REG="ghcr.io/homebrew-scion"

          IMAGES="core-base scion-base scion-antigravity scion-claude scion-codex scion-copilot scion-gemini-cli scion-gen scion-hermes scion-opencode scion-hub"

          for img in $IMAGES; do
            if docker buildx imagetools inspect "${REG}/${img}:v${VERSION}-amd64" >/dev/null 2>&1 && \
               docker buildx imagetools inspect "${REG}/${img}:v${VERSION}-arm64" >/dev/null 2>&1; then
              docker buildx imagetools create \
                --tag "${REG}/${img}:v${VERSION}" \
                "${REG}/${img}:v${VERSION}-amd64" \
                "${REG}/${img}:v${VERSION}-arm64"

              if [ "$IS_PRERELEASE" != "true" ]; then
                docker buildx imagetools create \
                  --tag "${REG}/${img}:latest" \
                  "${REG}/${img}:v${VERSION}-amd64" \
                  "${REG}/${img}:v${VERSION}-arm64"
              fi
            else
              echo "WARNING: one or both arch images missing for ${img}, skipping manifest merge"
            fi
          done

  update-formula:
    needs: [detect-release, merge-manifests]
    if: needs.detect-release.outputs.is_prerelease != 'true' && inputs.skip_formula_update != true
    runs-on: ubuntu-latest
    steps:
      - name: Download release tarballs and compute checksums
        id: checksums
        run: |
          VERSION="${{ needs.detect-release.outputs.new_version }}"
          BASE_URL="https://github.com/homebrew-scion/scion/releases/download/v${VERSION}"

          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            curl -fsSL -o "scion-${platform}.tar.gz" "${BASE_URL}/scion-${platform}.tar.gz"
            SHA=$(sha256sum "scion-${platform}.tar.gz" | awk '{print $1}')
            echo "sha256_${platform//-/_}=${SHA}" >> "$GITHUB_OUTPUT"
          done

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.detect-release.outputs.new_version }}"

          git clone "https://oauth2:${HOMEBREW_TAP_TOKEN}@github.com/homebrew-scion/homebrew-scion.git"
          cd homebrew-scion

          FORMULA="Formula/scion.rb"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Update SHA256 values in platform-specific blocks
          # The formula has nested on_macos/on_linux > on_intel/on_arm blocks
          # We use awk to find and replace sha256 in each block by context
          python3 - "$FORMULA" \
            "${{ steps.checksums.outputs.sha256_darwin_amd64 }}" \
            "${{ steps.checksums.outputs.sha256_darwin_arm64 }}" \
            "${{ steps.checksums.outputs.sha256_linux_amd64 }}" \
            "${{ steps.checksums.outputs.sha256_linux_arm64 }}" <<'PYEOF'
          import sys

          formula_path = sys.argv[1]
          shas = {
              'darwin-amd64': sys.argv[2],
              'darwin-arm64': sys.argv[3],
              'linux-amd64': sys.argv[4],
              'linux-arm64': sys.argv[5],
          }

          with open(formula_path, 'r') as f:
              content = f.read()

          lines = content.split('\n')
          result = []
          os_ctx = None
          arch_ctx = None

          for line in lines:
              stripped = line.strip()
              if stripped.startswith('on_macos'):
                  os_ctx = 'darwin'
              elif stripped.startswith('on_linux'):
                  os_ctx = 'linux'
              elif stripped.startswith('on_intel'):
                  arch_ctx = 'amd64'
              elif stripped.startswith('on_arm'):
                  arch_ctx = 'arm64'

              if stripped.startswith('sha256') and os_ctx and arch_ctx:
                  key = f"{os_ctx}-{arch_ctx}"
                  if key in shas:
                      indent = line[:len(line) - len(line.lstrip())]
                      line = f'{indent}sha256 "{shas[key]}"'

              result.append(line)

          with open(formula_path, 'w') as f:
              f.write('\n'.join(result))
          PYEOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: update formula to v${VERSION}"
          git push
